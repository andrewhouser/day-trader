services:
  trader:
    build: .
    container_name: day-trader-agent
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - TRADER_MODEL_NAME=deepseek-r1:14b
      - RESEARCH_MODEL=qwen3.5:latest
      - REPORT_MODEL=qwen2.5:7b
      - SENTIMENT_MODEL=llama3.1:8b
      - EVENTS_MODEL=qwen2.5:7b
      - EXPANSION_MODEL=qwen3.5:latest
      - COMPACTION_MODEL=phi3:3.8b
      - TEMPERATURE=0.3
      - RESEARCH_TIMEOUT=600
      - EVENTS_TIMEOUT=600
      - PERFORMANCE_TIMEOUT=900
      - HOURLY_CRON=0,30 9-16 * * 1-5
      - MORNING_REPORT_CRON=0 7 * * 1-5
      - RESEARCH_CRON=5/10 9-16 * * 1-5
      - STOP_LOSS_PCT=3.0
      - OPPORTUNITY_PCT=2.0
      - COMPACTION_CRON=0 5 * * 1-5
      - SENTIMENT_CRON=0 8,12,16 * * 1-5
      - RISK_MONITOR_CRON=*/3 9-16 * * 1-5
      - REBALANCER_CRON=0 6 * * 1
      - PERFORMANCE_CRON=0 6 * * 5
      - EVENTS_CRON=0 6 * * 1-5
      - EXPANSION_CRON=0 7 * * 3
      - PLAYBOOK_CRON=30 6 * * 5
      - MARKET_CONTEXT_CRON=55 6 * * 1-5
      - BEAR_CASE_THRESHOLD_PCT=5.0
      - PLAYBOOK_HIGH_CONFIDENCE_WIN_RATE=0.65
      - PLAYBOOK_HIGH_CONFIDENCE_MIN_TRADES=8
      - TEMPERATURE_HIGH_CONFIDENCE=0.1
      - TEMPERATURE_NO_PATTERN=0.6
      - TZ=America/New_York
      # Multi-source research engine API keys (optional — adapters degrade gracefully)
      - FRED_API_KEY=${FRED_API_KEY:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-}
      - SEC_EDGAR_CONTACT=${SEC_EDGAR_CONTACT:-research-agent@example.com}
      - RESEARCH_MAX_WORKERS=5
      - RESEARCH_CACHE_ENABLED=true
    ports:
      - "8000:8000"
    volumes:
      - ./trader:/app/trader
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build: ./web
    container_name: day-trader-web
    restart: unless-stopped
    environment:
      - API_URL=http://trader:8000
    ports:
      - "3000:3000"
    depends_on:
      - trader
