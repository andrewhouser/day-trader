services:
  trader:
    build: .
    container_name: day-trader-agent
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - TRADER_MODEL_NAME=${TRADER_MODEL_NAME:-deepseek-r1:14b}
      - RESEARCH_MODEL=${RESEARCH_MODEL:-qwen3.5:latest}
      - REPORT_MODEL=${REPORT_MODEL:-llama3.2}
      - SENTIMENT_MODEL=${SENTIMENT_MODEL:-llama3.1:8b}
      - EVENTS_MODEL=${EVENTS_MODEL:-llama3.2}
      - EXPANSION_MODEL=${EXPANSION_MODEL:-qwen3.5:latest}
      - COMPACTION_MODEL=${COMPACTION_MODEL:-qwen2.5:7b}
      - TEMPERATURE=0.3
      - RESEARCH_TIMEOUT=600
      - EVENTS_TIMEOUT=600
      - PERFORMANCE_TIMEOUT=900
      - REPORT_TIMEOUT=600
      # Overseas monitor schedules (all times ET, APScheduler: 0=Mon..6=Sun)
      - NIKKEI_OPEN_CRON=${NIKKEI_OPEN_CRON:-*/10 19-22 * * 6,0-3}
      - NIKKEI_REOPEN_CRON=${NIKKEI_REOPEN_CRON:-*/15 23 * * 6,0-3}
      - NIKKEI_REOPEN_LATE_CRON=${NIKKEI_REOPEN_LATE_CRON:-*/15 0-2 * * 0-4}
      - FTSE_OPEN_CRON=${FTSE_OPEN_CRON:-*/10 2-5 * * 0-4}
      - EUROPE_HANDOFF_CRON=${EUROPE_HANDOFF_CRON:-30 5 * * 0-4}
      # Core trading loop
      - HOURLY_CRON=0,15,30,45 9-15 * * 0-4
      - MORNING_REPORT_CRON=0 7 * * 0-4
      - RESEARCH_CRON=5,20,35,50 9-15 * * 0-4
      - STOP_LOSS_PCT=3.0
      - OPPORTUNITY_PCT=2.0
      - COMPACTION_CRON=0 5 * * 0-4
      - SENTIMENT_CRON=0 8,12,16 * * 0-4
      - RISK_MONITOR_CRON=*/3 9-15 * * 0-4
      - REBALANCER_CRON=0 6 * * 0
      - PERFORMANCE_CRON=0 6 * * 4
      - EVENTS_CRON=0 6 * * 0-4
      - EXPANSION_CRON=0 7 * * 2
      - PLAYBOOK_CRON=30 6 * * 4
      - MARKET_CONTEXT_CRON=55 6 * * 0-4
      - SPECULATION_CRON=${SPECULATION_CRON:-0 10,13,15 * * 0-4}
      - BEAR_CASE_THRESHOLD_PCT=5.0
      - PLAYBOOK_HIGH_CONFIDENCE_WIN_RATE=0.65
      - PLAYBOOK_HIGH_CONFIDENCE_MIN_TRADES=8
      - TEMPERATURE_HIGH_CONFIDENCE=0.1
      - TEMPERATURE_NO_PATTERN=0.6
      - TZ=America/New_York
      # Multi-source research engine API keys (optional — adapters degrade gracefully)
      - FRED_API_KEY=${FRED_API_KEY:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-}
      - SEC_EDGAR_CONTACT=${SEC_EDGAR_CONTACT:-research-agent@example.com}
      - RESEARCH_MAX_WORKERS=5
      - RESEARCH_CACHE_ENABLED=true
    ports:
      - "8000:8000"
    volumes:
      - ./trader:/app/trader
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build: ./web
    container_name: day-trader-web
    restart: unless-stopped
    environment:
      - API_URL=http://trader:8000
    ports:
      - "3000:3000"
    depends_on:
      - trader
